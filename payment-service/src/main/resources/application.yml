server:
  port: 8088

spring:
  application:
    name: payment-service
  config:
    import: optional:configserver:http://localhost:8086
  datasource:
    url: jdbc:h2:mem:paymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
